name: Morning Report

on:
  schedule:
    # 13:00 UTC = 8:00 AM ET / 9:00 AM ET (DST)
    - cron: '0 13 * * 1-5'  # weekdays only
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: read

jobs:
  morning-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git log

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx requests python-dotenv

      - name: Generate and send morning report
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Optional — morning report gracefully skips the Langfuse section if these are unset.
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PROJECT_ID: ${{ secrets.LANGFUSE_PROJECT_ID }}
          LANGFUSE_HOST: https://us.cloud.langfuse.com
        run: python scripts/morning_report.py

      - name: Sync commits to Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python scripts/jira_commits_sync.py \
            --since 24h \
            --project EAGLE \
            --author "blackga@nih.gov" \
            --weekly-summary "Greg Dev Weekly Summary —"
