<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Play, ui-sans-serif, system-ui, sans-serif" aria-label="eagle supervisor flow with intake gate and budget semantics">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c17"/><stop offset="100%" stop-color="#121829"/>
    </linearGradient>
    <linearGradient id="warmA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e86b3a"/><stop offset="100%" stop-color="#f2a66b"/>
    </linearGradient>
    <linearGradient id="coolA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a8fe0"/><stop offset="100%" stop-color="#6fa5e8"/>
    </linearGradient>
    <linearGradient id="accA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c9dff"/><stop offset="100%" stop-color="#a3bbff"/>
    </linearGradient>
    <linearGradient id="okA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>

    <style>
      text { pointer-events: none; }
    </style>
    <g id="pkt-warm"><rect x="-16" y="-10" width="32" height="20" rx="4" fill="url(#warmA)"/><text text-anchor="middle" dy="4" font-size="9" fill="#1a0a04" font-weight="700">REQ</text></g>
    <g id="pkt-cool"><rect x="-16" y="-10" width="32" height="20" rx="4" fill="url(#coolA)"/><text text-anchor="middle" dy="4" font-size="9" fill="#091426" font-weight="700">READ</text></g>
    <g id="pkt-acc"><rect x="-16" y="-10" width="32" height="20" rx="4" fill="url(#accA)"/><text text-anchor="middle" dy="4" font-size="9" fill="#0a1030" font-weight="700">CALL</text></g>
    <g id="pkt-ok"><rect x="-16" y="-10" width="32" height="20" rx="4" fill="url(#okA)"/><text text-anchor="middle" dy="4" font-size="9" fill="#052014" font-weight="700">DOC</text></g>
  </defs>

  <rect width="1600" height="900" fill="url(#bgA)"/>
  <text x="40" y="46" font-size="30" font-weight="700" fill="#f4f6fc">Supervisor flow - updated policy path</text>
  <text x="40" y="72" font-size="14" fill="#7b8599">CHECKLIST-FIRST + intake_required_facts gate + budget_semantics invariants</text>

  <!-- lane labels -->
  <text x="46" y="126" font-size="11" fill="#7b8599">USER</text>
  <text x="46" y="256" font-size="11" fill="#7b8599">SUPERVISOR + AGENTS</text>
  <text x="46" y="444" font-size="11" fill="#7b8599">TOOLS + DATA</text>
  <text x="46" y="682" font-size="11" fill="#7b8599">OUTPUTS</text>

  <!-- user -->
  <g transform="translate(40,138)">
    <title>{"node":"user_request","payload":{"intent":"document_generation","examples":["pws","igce","acquisition_plan"]}}</title>
    <rect width="280" height="66" rx="10" fill="#121829" stroke="#e86b3a"/>
    <text x="14" y="27" font-size="14" font-weight="700" fill="#f2a66b">User request</text>
    <text x="14" y="47" font-size="11" fill="#7b8599">"Generate PWS / IGCE / AP ..."</text>
  </g>

  <!-- supervisor -->
  <g transform="translate(390,210)">
    <title>{"node":"supervisor_agent","payload":{"rules":["checklist_first","intake_gate_before_create_document","budget_semantics_enforced"]}}</title>
    <rect width="360" height="118" rx="12" fill="#121829" stroke="#1f2740"/>
    <text x="18" y="30" font-size="16" font-weight="700" fill="#f4f6fc">Supervisor Agent</text>
    <text x="18" y="52" font-size="12" fill="#7b8599">- manage_package(checklist) first</text>
    <text x="18" y="72" font-size="12" fill="#7b8599">- intake gate before first create_document(doc_type)</text>
    <text x="18" y="92" font-size="12" fill="#7b8599">- budget_is_ceiling + no reconcile question</text>
  </g>

  <!-- intake gate -->
  <g transform="translate(790,228)">
    <title>{"node":"intake_gate","payload":{"operation":"query_compliance_matrix","params":{"operation":"intake_required_facts","doc_type":"target_doc_type"},"on_missing":"ask_single_batched_question"}}</title>
    <rect width="320" height="84" rx="10" fill="#121829" stroke="#7c9dff"/>
    <text x="16" y="30" font-size="14" font-weight="700" fill="#a3bbff">Pre-generation intake gate</text>
    <text x="16" y="50" font-size="11" fill="#7b8599">query_compliance_matrix(operation="intake_required_facts")</text>
    <text x="16" y="67" font-size="11" fill="#7b8599">Ask ONE batched missing-facts question if needed</text>
  </g>

  <!-- policy box -->
  <g transform="translate(1160,202)">
    <title>{"node":"matrix_policy","payload":{"keys":["intake_required_facts","budget_semantics"],"invariants":["budget_is_ceiling","igce_is_estimated_value","forbidden_behaviors"]}}</title>
    <rect width="390" height="140" rx="12" fill="#121829" stroke="#6fa5e8"/>
    <text x="18" y="30" font-size="15" font-weight="700" fill="#8db0ff">Policy source (matrix.json)</text>
    <text x="18" y="55" font-size="12" fill="#7b8599">intake_required_facts[doc_type].required</text>
    <text x="18" y="76" font-size="12" fill="#7b8599">budget_semantics.budget_is_ceiling = true</text>
    <text x="18" y="97" font-size="12" fill="#7b8599">forbidden_behaviors[] (no reconcile / no inflation)</text>
    <text x="18" y="118" font-size="12" fill="#7b8599">igce_is_estimated_value propagation</text>
  </g>

  <!-- tools row -->
  <g transform="translate(120,480)">
    <rect width="250" height="78" rx="10" fill="#121829" stroke="#4a8fe0"/>
    <text x="14" y="30" font-size="13" font-weight="700" fill="#6fa5e8">query_compliance_matrix</text>
    <text x="14" y="50" font-size="11" fill="#7b8599">intake_required_facts / budget_semantics</text>
  </g>
  <g transform="translate(420,480)">
    <rect width="240" height="78" rx="10" fill="#121829" stroke="#4a8fe0"/>
    <text x="14" y="30" font-size="13" font-weight="700" fill="#6fa5e8">get_intake_status</text>
    <text x="14" y="50" font-size="11" fill="#7b8599">session/package fact inventory</text>
  </g>
  <g transform="translate(700,480)">
    <rect width="240" height="78" rx="10" fill="#121829" stroke="#4a8fe0"/>
    <text x="14" y="30" font-size="13" font-weight="700" fill="#6fa5e8">manage_package</text>
    <text x="14" y="50" font-size="11" fill="#7b8599">checklist + required docs status</text>
  </g>
  <g transform="translate(980,480)">
    <title>{"node":"create_document","payload":{"precondition":"intake_gate_passed","constraint":"do_not_exceed_budget_ceiling"}}</title>
    <rect width="250" height="78" rx="10" fill="#121829" stroke="#7c9dff"/>
    <text x="14" y="30" font-size="13" font-weight="700" fill="#a3bbff">create_document</text>
    <text x="14" y="50" font-size="11" fill="#7b8599">called only after gate pass</text>
  </g>
  <g transform="translate(1260,480)">
    <rect width="290" height="78" rx="10" fill="#121829" stroke="#1f2740"/>
    <text x="14" y="30" font-size="13" font-weight="700" fill="#e08dbb">DynamoDB + KB context</text>
    <text x="14" y="50" font-size="11" fill="#7b8599">stored facts + external research evidence</text>
  </g>

  <!-- outputs -->
  <g transform="translate(120,708)">
    <rect width="330" height="104" rx="12" fill="#161d32" stroke="#1f2740"/>
    <text x="16" y="31" font-size="14" font-weight="700" fill="#f4f6fc">Clarifying question (if missing facts)</text>
    <text x="16" y="53" font-size="11" fill="#7b8599">Single batched ask, not repeated ping-pong</text>
    <text x="16" y="72" font-size="11" fill="#7b8599">Example: event_cadence + deliverable_format</text>
  </g>
  <g transform="translate(500,708)">
    <rect width="330" height="104" rx="12" fill="#161d32" stroke="#1f2740"/>
    <text x="16" y="31" font-size="14" font-weight="700" fill="#f4f6fc">Document generated</text>
    <text x="16" y="53" font-size="11" fill="#7b8599">PWS/SOW/IGCE/AP/J&amp;A with validated inputs</text>
    <text x="16" y="72" font-size="11" fill="#7b8599">Checklist progress updates in package panel</text>
  </g>
  <g transform="translate(880,708)">
    <title>{"node":"budget_outcome","payload":{"blocked":["reconcile_question","scope_inflation_to_spend_budget"],"allowed":"igce_below_budget_ceiling"}}</title>
    <rect width="670" height="104" rx="12" fill="#161d32" stroke="#34d399"/>
    <text x="16" y="31" font-size="14" font-weight="700" fill="#6ee7b7">Budget semantics preserved</text>
    <text x="16" y="53" font-size="11" fill="#7b8599">No "budget $2M vs IGCE $450K reconcile" question</text>
    <text x="16" y="72" font-size="11" fill="#7b8599">No inflation to consume budget headroom; ceiling not exceeded</text>
  </g>

  <!-- rails -->
  <g stroke="#2a3657" stroke-width="2" stroke-dasharray="4 6" fill="none">
    <path d="M 320 172 C 350 172, 365 220, 390 250"/>
    <path d="M 750 270 L 790 270"/>
    <path d="M 1110 270 C 1140 270,1145 270,1160 270"/>
    <path d="M 910 312 C 870 390, 760 442, 820 480"/>
    <path d="M 910 312 C 660 390, 290 442, 240 480"/>
    <path d="M 910 312 C 760 390, 520 442, 540 480"/>
    <path d="M 910 312 C 950 390, 1110 442, 1105 480"/>
    <path d="M 1105 558 C 1110 630, 655 670, 665 708"/>
    <path d="M 1105 558 C 1210 640, 1230 670, 1215 708"/>
    <path d="M 540 558 C 420 640, 300 670, 285 708"/>
  </g>

  <!-- animated packets -->
  <use href="#pkt-warm" visibility="hidden">
    <set attributeName="visibility" to="visible" begin="0.02s"/>
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M 320 172 C 350 172, 365 220, 390 250"/>
  </use>
  <use href="#pkt-acc" visibility="hidden">
    <set attributeName="visibility" to="visible" begin="0.2s"/>
    <animateMotion dur="2.2s" begin="0.2s" repeatCount="indefinite" path="M 750 270 L 790 270"/>
  </use>
  <use href="#pkt-cool" visibility="hidden">
    <set attributeName="visibility" to="visible" begin="0.4s"/>
    <animateMotion dur="2.8s" begin="0.4s" repeatCount="indefinite" path="M 1110 270 C 1140 270,1145 270,1160 270"/>
  </use>
  <use href="#pkt-cool" visibility="hidden">
    <set attributeName="visibility" to="visible" begin="0.9s"/>
    <animateMotion dur="3.0s" begin="0.9s" repeatCount="indefinite" path="M 910 312 C 660 390, 290 442, 240 480"/>
  </use>
  <use href="#pkt-cool" visibility="hidden">
    <set attributeName="visibility" to="visible" begin="1.2s"/>
    <animateMotion dur="3.0s" begin="1.2s" repeatCount="indefinite" path="M 910 312 C 950 390, 1110 442, 1105 480"/>
  </use>
  <use href="#pkt-ok" visibility="hidden">
    <set attributeName="visibility" to="visible" begin="0.7s"/>
    <animateMotion dur="3.2s" begin="0.7s" repeatCount="indefinite" path="M 1105 558 C 1110 630, 655 670, 665 708"/>
  </use>
  <use href="#pkt-ok" visibility="hidden">
    <set attributeName="visibility" to="visible" begin="1.1s"/>
    <animateMotion dur="3.2s" begin="1.1s" repeatCount="indefinite" path="M 1105 558 C 1210 640, 1230 670, 1215 708"/>
  </use>

  <!-- pulse indicators -->
  <circle cx="1040" cy="520" r="6" fill="#7c9dff">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1204" cy="736" r="6" fill="#34d399">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- labels -->
  <text x="334" y="160" font-size="10" fill="#7b8599">intent</text>
  <text x="774" y="258" font-size="10" fill="#a3bbff">gate</text>
  <text x="1164" y="258" font-size="10" fill="#8db0ff">matrix policy read</text>
  <text x="1060" y="472" font-size="10" fill="#a3bbff">generation boundary</text>
  <text x="60" y="860" font-size="11" fill="#7b8599">Updated to current supervisor rules in eagle-plugin/agents/supervisor/agent.md</text>
</svg>
