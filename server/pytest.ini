[pytest]
asyncio_mode = auto
addopts = --ignore=tests/test_eagle_sdk_eval.py --ignore=tests/test_strands_eval.py
filterwarnings =
    ignore:Please use `import python_multipart`:PendingDeprecationWarning
    ignore:.*HMAC key.*bytes long.*:UserWarning
    ignore:.*The HMAC key.*:
    ignore:.*datetime.datetime.utcnow.*:DeprecationWarning
