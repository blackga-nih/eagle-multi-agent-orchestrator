<svg width="780" height="500" viewBox="0 0 780 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 23px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #4b5563; }
      .tag { font: 700 13px Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <text x="40" y="40" class="title">Where time should go vs. where value comes from</text>
  <text x="40" y="62" class="small">Target: maximize human time on Plan + Review</text>

  <!-- Outer ring (value leverage) -->
  <circle cx="280" cy="260" r="150" fill="none" stroke="#c084fc" stroke-width="26"/>
  <text x="280" y="85" text-anchor="middle" class="tag">Outer ring = Leverage/Trust</text>

  <!-- Inner ring (time allocation) -->
  <circle cx="280" cy="260" r="102" fill="none" stroke="#93c5fd" stroke-width="26"/>
  <text x="280" y="455" text-anchor="middle" class="tag">Inner ring = Time spent</text>

  <!-- Quadrant labels -->
  <rect x="420" y="120" width="300" height="58" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="438" y="143" class="tag">Plan</text>
  <text x="438" y="163" class="small">High leverage, high trust impact</text>

  <rect x="420" y="190" width="300" height="58" rx="10" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="438" y="213" class="tag">Implement (Autonomous)</text>
  <text x="438" y="233" class="small">Agent executes code changes</text>

  <rect x="420" y="260" width="300" height="58" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="438" y="283" class="tag">Validate (Autonomous)</text>
  <text x="438" y="303" class="small">Generate tests, run tests, capture evidence</text>

  <rect x="420" y="330" width="300" height="58" rx="10" fill="#faf5ff" stroke="#a855f7"/>
  <text x="438" y="353" class="tag">Review (Human)</text>
  <text x="438" y="373" class="small">Fast decision using review template + screenshots</text>

  <!-- Connectors -->
  <line x1="350" y1="160" x2="420" y2="149" stroke="#6b7280"/>
  <line x1="382" y1="225" x2="420" y2="219" stroke="#6b7280"/>
  <line x1="382" y1="295" x2="420" y2="289" stroke="#6b7280"/>
  <line x1="350" y1="360" x2="420" y2="359" stroke="#6b7280"/>
</svg>
