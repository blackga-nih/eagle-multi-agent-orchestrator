<svg width="760" height="520" viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .sub { font: 14px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 14px Arial, sans-serif; fill: white; }
      .note { font: 13px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>
  </defs>

  <text x="40" y="40" class="title">Human-in-the-loop AI Flywheel</text>
  <text x="40" y="64" class="sub">Spend most time on Planning + Review (highest leverage)</text>

  <!-- Donut segments -->
  <circle cx="300" cy="270" r="150" fill="none" stroke="#2563eb" stroke-width="70"
          stroke-dasharray="188 754" stroke-dashoffset="0" transform="rotate(-90 300 270)"/>
  <circle cx="300" cy="270" r="150" fill="none" stroke="#10b981" stroke-width="70"
          stroke-dasharray="132 810" stroke-dashoffset="-188" transform="rotate(-90 300 270)"/>
  <circle cx="300" cy="270" r="150" fill="none" stroke="#f59e0b" stroke-width="70"
          stroke-dasharray="151 791" stroke-dashoffset="-320" transform="rotate(-90 300 270)"/>
  <circle cx="300" cy="270" r="150" fill="none" stroke="#8b5cf6" stroke-width="70"
          stroke-dasharray="283 659" stroke-dashoffset="-471" transform="rotate(-90 300 270)"/>

  <!-- Center -->
  <circle cx="300" cy="270" r="85" fill="#ffffff"/>
  <text x="300" y="262" text-anchor="middle" class="note" font-weight="700">Value</text>
  <text x="300" y="282" text-anchor="middle" class="note" font-weight="700">Compounds</text>

  <!-- Labels -->
  <text x="235" y="108" class="label">Plan 25%</text>
  <text x="455" y="230" class="label" fill="#111827">Implement 18%</text>
  <text x="365" y="408" class="label" fill="#111827">Validate 20%</text>
  <text x="135" y="300" class="label">Review 37%</text>

  <!-- Rotation arrow -->
  <path d="M520 270 A220 220 0 1 1 518 250" fill="none" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="560" y="120" width="16" height="16" fill="#2563eb"/><text x="584" y="133" class="note">Plan (human-led)</text>
  <rect x="560" y="150" width="16" height="16" fill="#10b981"/><text x="584" y="163" class="note">Implement (agent-led)</text>
  <rect x="560" y="180" width="16" height="16" fill="#f59e0b"/><text x="584" y="193" class="note">Validate (agent + tests)</text>
  <rect x="560" y="210" width="16" height="16" fill="#8b5cf6"/><text x="584" y="223" class="note">Review (human high leverage)</text>
</svg>
