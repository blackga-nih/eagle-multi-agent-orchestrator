<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 14px Arial, sans-serif; fill: #111827; }
      .text { font: 13px Arial, sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>
  </defs>

  <text x="40" y="40" class="title">Structured Prompt Funnel � Autonomous Build Pipeline</text>

  <!-- Funnel -->
  <polygon points="60,90 380,90 290,220 150,220" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="220" y="130" text-anchor="middle" class="label">Human Intent</text>
  <text x="220" y="150" text-anchor="middle" class="text">Goal, constraints, priorities</text>
  <text x="220" y="185" text-anchor="middle" class="label">Structured Plan + Prompt</text>

  <!-- Guardrails -->
  <rect x="420" y="85" width="180" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="510" y="115" text-anchor="middle" class="label">Guardrail: Scope</text>

  <rect x="420" y="150" width="180" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="510" y="180" text-anchor="middle" class="label">Guardrail: Standards</text>

  <rect x="420" y="215" width="180" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="510" y="245" text-anchor="middle" class="label">Guardrail: Tests/Policy</text>

  <!-- Pipeline -->
  <rect x="650" y="80" width="200" height="54" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="750" y="112" text-anchor="middle" class="label">Agent Implements</text>

  <rect x="650" y="150" width="200" height="54" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="750" y="182" text-anchor="middle" class="label">Agent Writes/Runs Tests</text>

  <rect x="650" y="220" width="200" height="54" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="750" y="252" text-anchor="middle" class="label">Artifacts + Screenshots</text>

  <rect x="650" y="290" width="200" height="54" rx="10" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="750" y="322" text-anchor="middle" class="label">Fast Human Review</text>

  <!-- Arrows -->
  <line x1="290" y1="220" x2="410" y2="110" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="110" x2="640" y2="107" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="134" x2="750" y2="146" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="204" x2="750" y2="216" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="274" x2="750" y2="286" stroke="#111827" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="40" y="470" class="text">Principle: humans optimize direction and trust; agents optimize execution speed and consistency.</text>
</svg>
